<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoTrack | Collector Dashboard</title>
    <link rel="stylesheet" href="/collector-dashboard.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="dashboard-header">
      <div>
        <h1>Garbage Collector Dashboard</h1>
        <p id="userMobile">Mobile: Loading...</p>
      </div>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </header>

    <!-- Main Content -->
    <main class="dashboard-content">
      <!-- Priority Alert Section -->
      <section class="priority-section">
        <h2>Priority Collections</h2>
        <p class="section-subtitle">Full & Warning bins need immediate attention</p>
        <div id="priorityBins" class="bins-container">
          <!-- Full and Warning bins injected here -->
        </div>
      </section>

      <!-- All Assigned Bins Section -->
      <section class="all-bins-section">
        <h2>All Assigned Bins</h2>
        <div id="allBins" class="bins-container">
          <!-- All bins injected here -->
        </div>
      </section>

      <!-- Loading State -->
      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <p>Loading your assigned bins...</p>
      </div>

      <!-- Empty State -->
      <div id="emptyState" class="empty-state" style="display: none;">
        <div class="empty-icon">✓</div>
        <h3>No Bins Assigned</h3>
        <p>All bins have been collected! Great job!</p>
      </div>
    </main>

    <script src="/collector-dashboard.js"></script>
  </body>
</html>
