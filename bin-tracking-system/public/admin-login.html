<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoTrack - Admin Login</title>
    <link rel="stylesheet" href="/ecotrack-theme.css" />
    <style>
      .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        background: var(--background);
      }

      .login-card {
        background: var(--card-bg);
        border-radius: var(--radius);
        padding: 48px;
        box-shadow: var(--shadow-lg);
        width: 100%;
        max-width: 450px;
        animation: fadeIn 0.6s ease-out;
      }

      .login-header {
        text-align: center;
        margin-bottom: 32px;
      }

      .login-logo {
        font-size: 3rem;
        margin-bottom: 12px;
      }

      .login-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 8px;
      }

      .login-subtitle {
        color: var(--text-light);
        font-size: 0.95rem;
      }

      .password-wrapper {
        position: relative;
      }

      .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.2rem;
        color: var(--text-light);
        transition: color 0.3s ease;
      }

      .password-toggle:hover {
        color: var(--blue-accent);
      }

      .error-message {
        background: #fef2f2;
        color: var(--red);
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
        border: 1px solid #fecaca;
        display: none;
        font-size: 0.9rem;
      }

      .error-message.show {
        display: block;
        animation: fadeIn 0.3s ease-out;
      }

      .login-footer {
        text-align: center;
        margin-top: 24px;
        color: var(--text-light);
        font-size: 0.9rem;
      }

      .login-footer a {
        color: var(--blue-accent);
        text-decoration: none;
        font-weight: 600;
      }

      .login-footer a:hover {
        text-decoration: underline;
      }

      .back-link {
        display: inline-block;
        margin-top: 20px;
        color: var(--text-light);
        text-decoration: none;
        font-size: 0.9rem;
      }

      .back-link:hover {
        color: var(--blue-accent);
      }

      @media (max-width: 480px) {
        .login-card {
          padding: 32px 24px;
        }

        .login-title {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <div class="login-header">
          <div class="login-logo">♻️</div>
          <h1 class="login-title">Admin Login</h1>
          <p class="login-subtitle">Access the EcoTrack Admin Dashboard</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="mobile">Mobile Number</label>
            <input
              type="tel"
              id="mobile"
              name="mobile"
              class="form-input"
              placeholder="Enter 10-digit mobile number"
              maxlength="10"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Enter your password"
                required
              />
              <button type="button" class="password-toggle" onclick="togglePassword()">
                👁️
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-success btn-block" id="submitBtn">
            Login
          </button>
        </form>

        <div class="login-footer">
          <p>Don't have access? <a href="/landing.html">Back to Home</a></p>
        </div>

        <a href="/landing.html" class="back-link">← Back to Landing Page</a>
      </div>
    </div>

    <script>
      const API_URL = 'http://localhost:5000';
      const TOKEN_KEY = 'admin_token';
      const nextUrl = new URLSearchParams(window.location.search).get('next') || '/app.html';

      function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.querySelector('.password-toggle');
        
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          toggleBtn.textContent = '🙈';
        } else {
          passwordInput.type = 'password';
          toggleBtn.textContent = '👁️';
        }
      }

      function showError(message) {
        const errorEl = document.getElementById('errorMessage');
        errorEl.textContent = message;
        errorEl.classList.add('show');
      }

      function hideError() {
        const errorEl = document.getElementById('errorMessage');
        errorEl.classList.remove('show');
      }

      // Mobile number validation - only allow digits
      document.getElementById('mobile').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
      });

      document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        hideError();

        const mobile = document.getElementById('mobile').value.trim();
        const password = document.getElementById('password').value;
        const submitBtn = document.getElementById('submitBtn');

        if (!/^\d{10}$/.test(mobile)) {
          showError('Mobile number must be exactly 10 digits');
          return;
        }

        if (password.length < 6) {
          showError('Password must be at least 6 characters');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in...';

        try {
          const response = await fetch(`${API_URL}/admin/login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ mobile, password }),
          });

          const data = await response.json().catch(() => ({}));

          if (response.ok) {
            // Keep token key aligned with dashboard auth guard
            localStorage.setItem(TOKEN_KEY, data.token);
            localStorage.setItem('adminName', data.admin.name);
            const u = new URL(nextUrl, window.location.origin);
            u.hash = `token=${encodeURIComponent(data.token)}`;
            window.location.href = u.toString();
          } else {
            showError(data.message || 'Invalid credentials. Please try again.');
          }
        } catch (error) {
          showError('Network error. Please check your connection.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Login';
        }
      });
    </script>
  </body>
</html>
