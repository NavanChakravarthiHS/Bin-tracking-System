<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoTrack | Collector Signup</title>
    <link rel="stylesheet" href="/collector-auth.css" />
  </head>
  <body>
    <div class="auth-container">
      <!-- Logo -->
      <div class="auth-logo">
        <h1>♻️ EcoTrack</h1>
        <p>Smart Waste Bin Tracking System</p>
      </div>

      <!-- Signup Card -->
      <div class="auth-card">
        <h2>Garbage Collector Signup</h2>
        <p class="subtitle">Create your account to get started</p>

        <!-- Message Display -->
        <div id="message" class="message"></div>

        <!-- Signup Form -->
        <form id="signupForm">
          <!-- Mobile Number -->
          <div class="form-group">
            <label for="mobile">Mobile Number</label>
            <input
              type="tel"
              id="mobile"
              name="mobile"
              placeholder="Enter 10-digit mobile number"
              maxlength="10"
              required
            />
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter password (min 6 characters)"
                minlength="6"
                required
              />
              <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                👁️
              </button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Re-enter password"
                minlength="6"
                required
              />
              <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">
                👁️
              </button>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn-submit" id="submitBtn">
            Sign Up
          </button>
        </form>

        <!-- Login Link -->
        <div class="auth-link">
          Already have an account? <a href="/collector-login.html">Login here</a>
        </div>
      </div>
    </div>

    <script>
      const API_URL = 'http://localhost:5000';

      // Toggle password visibility
      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
          input.type = 'text';
          btn.textContent = '🙈';
        } else {
          input.type = 'password';
          btn.textContent = '👁️';
        }
      }

      // Show message
      function showMessage(text, type) {
        const messageEl = document.getElementById('message');
        messageEl.textContent = text;
        messageEl.className = `message ${type}`;
      }

      // Clear message
      function clearMessage() {
        const messageEl = document.getElementById('message');
        messageEl.className = 'message';
        messageEl.textContent = '';
      }

      // Mobile number validation - only allow digits
      document.getElementById('mobile').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
      });

      // Form submission
      document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        clearMessage();

        const mobile = document.getElementById('mobile').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const submitBtn = document.getElementById('submitBtn');

        // Client-side validation
        if (!/^\d{10}$/.test(mobile)) {
          showMessage('Mobile number must be exactly 10 digits', 'error');
          return;
        }

        if (password.length < 6) {
          showMessage('Password must be at least 6 characters', 'error');
          return;
        }

        if (password !== confirmPassword) {
          showMessage('Passwords do not match', 'error');
          return;
        }

        // Disable button and show loading
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Creating account...';

        try {
          const response = await fetch(`${API_URL}/collector/signup`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ mobile, password, confirmPassword }),
          });

          const data = await response.json();

          if (response.ok) {
            showMessage('Signup successful! Redirecting to login...', 'success');
            setTimeout(() => {
              window.location.href = '/collector-login.html';
            }, 1500);
          } else {
            showMessage(data.message || 'Signup failed. Please try again.', 'error');
          }
        } catch (error) {
          showMessage('Network error. Please check your connection.', 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Sign Up';
        }
      });
    </script>
  </body>
</html>
